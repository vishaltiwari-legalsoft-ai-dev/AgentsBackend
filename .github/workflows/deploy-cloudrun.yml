name: Deploy Backend to Cloud Run

# CI/CD: every push to main rebuilds the container and redeploys to Cloud Run.
# Adding a new agent? Just push to main and this pipeline ships it.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  SERVICE: agentos-backend
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --service-account "${{ secrets.CLOUD_RUN_SA }}" \
            --memory 2Gi --cpu 2 --timeout 600 \
            --quiet
          # Runtime env vars (OPENROUTER_API_KEY, JWT_SECRET, etc.) are set ONCE
          # on the service and preserved across deploys, so this pipeline never
          # needs to touch secrets.
